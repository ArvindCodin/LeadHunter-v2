kind = "web"
previewPath = "/"
title = "LeadHunter Chennai"
version = "1.0.0"
id = "artifacts/leadhunter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18824

[services.development]
run = "pnpm --filter @workspace/leadhunter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/leadhunter", "run", "build" ]
publicDir = "artifacts/leadhunter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18824"
BASE_PATH = "/"
